            text: |
              После пробного у тебя появляется более понятная картина.

              Ты начинаешь видеть:

              — что у тебя уже получается
              — где именно основные слабые места
              — насколько ситуация требует срочной работы
              — в какую сторону логичнее двигаться дальше
              — какой формат занятий подойдёт тебе лучше всего

              То есть пробное помогает не просто познакомиться,
              а снять туман и понять, что делать дальше.

