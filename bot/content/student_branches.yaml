              branch_id: "student_exam"
              role: "student"
              goal: "exam"

            implementation_notes:
              - "Экран должен продавать пробное как первую нормальную диагностику ситуации."

        - screen:
            id: "student_exam_8"
            type: "content"
            scope: "student_branch"
            title: "Экран 8 — как проходит пробное"
            purpose: >
              Объяснить механику пробного и показать,
              что это полезный и понятный первый шаг.

            text: |
              Пробное занятие у нас — это не просто первый урок.

              Оно нужно, чтобы быстро понять, где ты сейчас находишься по отношению к экзамену и как лучше выстроить подготовку дальше.

              На пробном мы обычно:

              — знакомимся и уточняем твою цель
              — даём задания и вопросы по твоему текущему уровню
              — смотрим, какие темы ты уже понимаешь нормально, а где начинаются основные трудности
              — разбираем один из моментов так, чтобы тебе уже на пробном стало понятнее
              — в конце формируем понятный следующий шаг по подготовке

