                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_unsure_7"

            analytics_tags:
              screen_group: "student_unsure"
              funnel_stage: "branch_core"
              screen_order: 6
              branch_id: "student_unsure"
              role: "student"
              goal: "unsure"

            implementation_notes:
              - "Можно позже добавить карточку или короткое видео с преимуществами формата."

        - screen:
            id: "student_unsure_7"
            type: "content"
            scope: "student_branch"
            title: "Экран 7 — зачем начинать с пробного"
            purpose: >
              Объяснить, что в ситуации неопределённости пробное —
              лучший первый шаг, потому что оно даёт ясность.

            text: |
              Если ты пока не до конца понимаешь, что именно тебе сейчас нужно по математике, это как раз тот случай, когда лучше всего начинать с пробного.

              Потому что пробное помогает спокойно ответить на главные вопросы:

              — что у тебя сейчас с математикой
              — где именно слабые места
              — насколько это критично
              — нужен ли тебе упор на базу, школьную программу, экзамен или более сильный уровень
              — и какой преподаватель подойдёт тебе лучше всего

              Поэтому пробное здесь — это не формальность,
              а способ получить ясность и понять, что делать дальше.

