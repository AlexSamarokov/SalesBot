              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_unsure_8"

            analytics_tags:
              screen_group: "student_unsure"
              funnel_stage: "branch_core"
              screen_order: 7
              branch_id: "student_unsure"
              role: "student"
              goal: "unsure"

            implementation_notes:
              - "Экран должен продавать пробное как способ получить ясность, а не как формальность."

        - screen:
            id: "student_unsure_8"
            type: "content"
            scope: "student_branch"
            title: "Экран 8 — как проходит пробное"
            purpose: >
              Объяснить механику пробного и показать, что это полезный
              и понятный первый шаг.

            text: |
              Пробное занятие у нас — это не просто первый урок.

              Оно нужно, чтобы быстро понять твою ситуацию и помочь тебе сориентироваться дальше.

              На пробном мы обычно:

              — знакомимся и уточняем, что у тебя сейчас по математике
              — даём задания и вопросы по твоему уровню
              — смотрим, где именно начинается непонимание
              — разбираем один из моментов так, чтобы тебе уже на пробном стало понятнее
              — в конце формируем понятный следующий шаг

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
