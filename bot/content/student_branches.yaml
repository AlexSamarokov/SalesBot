branches:
  - branch:
      id: "student_school_math"
      role: "role_student"
      goal: "goal_school_math"
      title: "Школьник → подтянуть школьную математику"
      purpose: >
        Последовательно довести школьника до мысли, что проблема не в его
        “неспособности”, а в накопившемся непонимании; что здесь ему могут
        объяснить нормально и по-человечески; и что пробное — это понятный
        и безопасный способ быстро разобраться в своей ситуации и понять,
        подойдёт ли формат.

      screens:
        - screen:
            id: "student_schoolmath_4"
            type: "content"
            scope: "student_branch"
            title: "Экран 4 — узнавание ситуации"
            purpose: >
              Показать школьнику, что бот понимает его контекст:
              темы наслаиваются, уверенности нет, и проблема не в способностях.

            text: |
              Поняли тебя.

              Если сейчас по математике всё идёт тяжело, это не значит, что ты “не способен” к предмету.

              Чаще всего проблема в другом:
              какую-то тему когда-то нормально не понял,
              потом сверху пошла следующая,
              и дальше математика начинает казаться всё более мутной и тяжёлой.

              В итоге вроде что-то учишь,
              что-то даже решаешь,
              но общей уверенности всё равно нет.

              Сейчас коротко покажем, как мы в Менториуме с этим работаем 👇

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_schoolmath_5"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_schoolmath_5"

            analytics_tags:
              screen_group: "student_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 4
              branch_id: "student_school_math"
              role: "student"
              goal: "school_math"

            implementation_notes:
              - "Первый экран ветки после общей сегментации."
              - "Экран должен работать без медиа в MVP."
              - "Тон должен быть живым и без родительских формулировок."

        - screen:
            id: "student_schoolmath_5"
            type: "content"
            scope: "student_branch"
            title: "Экран 5 — типичная ситуация"
            purpose: >
              Углубить узнавание и назвать типичные состояния школьника,
              которому непонятна школьная математика.

            text: |
              Обычно в такой ситуации всё выглядит примерно так:

              — в школе вроде объясняли, но до конца не дошло
              — темы наслаиваются друг на друга
              — где-то уже начинаешь путаться даже в базе
              — математика становится предметом, который просто хочется побыстрее пережить
              — и непонятно, с чего вообще начать, чтобы это починить

              И в такой момент важнее не просто “решать ещё больше”,
              а сначала понять, где именно начинается непонимание и что тебе реально мешает двигаться дальше.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_schoolmath_6"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_schoolmath_6"

            analytics_tags:
              screen_group: "student_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 5
              branch_id: "student_school_math"
              role: "student"
              goal: "school_math"

            implementation_notes:
              - "Не перегружать экран дополнительными CTA."
              - "Важно сохранить разговорный тон без канцелярита."

        - screen:
            id: "student_schoolmath_6"
            type: "content"
            scope: "student_branch"
            title: "Экран 6 — как работает Менториум"
            purpose: >
              Показать механику сервиса и УТП школы в контексте школьной математики:
              объясняем по-человечески, индивидуально и без потока.

            text: |
              Поэтому в Менториуме мы не просто даём занятия по математике.

              Мы выстраиваем работу так, чтобы тебе реально стало понятнее и чтобы ты видел прогресс по ходу занятий.

              Что это значит на практике:

              — только индивидуальные занятия, без групп
              — преподавателя подбираем под твою цель и твой уровень
              — выстраиваем индивидуальный план подготовки
              — каждую неделю даём индивидуальные контрольные под твою задачу
              — у каждого ученика есть личный ассистент-математик
              — с тобой работают только молодые преподаватели, студенты топовых вузов России, чтобы объяснение было нормальным и вы были на одной волне

              То есть здесь всё не “для всех сразу”, а конкретно под тебя.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_schoolmath_7"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_schoolmath_7"

            analytics_tags:
              screen_group: "student_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 6
              branch_id: "student_school_math"
              role: "student"
              goal: "school_math"

            implementation_notes:
              - "Можно позже добавить карточку или короткое видео с преимуществами формата."
              - "Нельзя скатываться в язык типа 'образовательная траектория'."

        - screen:
            id: "student_schoolmath_7"
            type: "content"
            scope: "student_branch"
            title: "Экран 7 — зачем начинать с пробного"
            purpose: >
              Снять главный вопрос школьника: будет ли ему реально понятно
              и будет ли от занятий толк.

            text: |
              Если ты сейчас ищешь помощь по математике, тебе, скорее всего, важно не просто найти какого-то репетитора.

              Тебе важно понять:

              — будет ли тебе с ним реально понятно
              — сможет ли он объяснять нормально, а не как в школе
              — получится ли у тебя наконец начать разбираться в темах
              — и будет ли от занятий реальный толк

              Поэтому у нас всё начинается с пробного:
              чтобы сначала спокойно посмотреть, как тебе заходит объяснение и в чём у тебя сейчас главная проблема.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_schoolmath_8"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_schoolmath_8"

            analytics_tags:
              screen_group: "student_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 7
              branch_id: "student_school_math"
              role: "student"
              goal: "school_math"

            implementation_notes:
              - "Экран должен продавать пробное как проверку совпадения с форматом и преподавателем."

        - screen:
            id: "student_schoolmath_8"
            type: "content"
            scope: "student_branch"
            title: "Экран 8 — как проходит пробное"
            purpose: >
              Объяснить механику пробного и показать, что это полезный
              и понятный первый шаг.

            text: |
              Пробное занятие у нас — это не просто “первый урок”.

              Оно нужно, чтобы быстро понять твою ситуацию и показать, как с ней можно работать дальше.

              На пробном мы обычно:

              — знакомимся и уточняем, что именно у тебя сейчас по математике
              — даём задания и вопросы по твоему уровню
              — смотрим, где именно начинается путаница
              — разбираем один из моментов так, чтобы тебе уже на пробном стало понятнее
              — в конце формируем понятный следующий шаг

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_schoolmath_9"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_schoolmath_9"

            analytics_tags:
              screen_group: "student_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 8
              branch_id: "student_school_math"
              role: "student"
              goal: "school_math"

            implementation_notes:
              - "Позже сюда можно добавить короткое видео о пробном."

        - screen:
            id: "student_schoolmath_9"
            type: "content"
            scope: "student_branch"
            title: "Экран 9 — что школьник получает после пробного"
            purpose: >
              Продать результат пробного как быстрое понимание своей ситуации
              и следующий шаг.

            text: |
              После пробного ты не выходишь с мыслью “ну вроде что-то порешали”.

              Ты начинаешь лучше понимать:

              — что у тебя уже получается
              — где именно у тебя слабые места
              — что мешает двигаться дальше
              — с чего лучше начинать, чтобы был прогресс
              — и подходит ли тебе такой формат занятий

              То есть пробное — это не формальность,
              а реальный способ быстро разобраться в своей ситуации.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_schoolmath_10"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_schoolmath_10"

            analytics_tags:
              screen_group: "student_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 9
              branch_id: "student_school_math"
              role: "student"
              goal: "school_math"

            implementation_notes:
              - "Этот экран усиливает ценность пробного перед CTA."

        - screen:
            id: "student_schoolmath_10"
            type: "cta"
            scope: "student_branch"
            title: "Экран 10 — главный CTA"
            purpose: >
              Мягко перевести школьника в контакт с менеджером
              для записи на пробное или вопроса.

            text: |
              Следующий шаг — просто написать менеджеру.

              Он поможет подобрать преподавателя
              и предложит удобное время для пробного.

              Если хочешь, можешь сначала просто задать вопрос без записи.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Записаться на пробное"
                action: "open_trial_signup"
                target: "manager_trial_signup_student_schoolmath"

              - text: "Задать вопрос"
                action: "open_manager_chat"
                target: "manager_question_student_schoolmath"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Записаться на пробное": "manager_trial_signup_student_schoolmath"
                "Задать вопрос": "manager_question_student_schoolmath"

            analytics_tags:
              screen_group: "student_schoolmath"
              funnel_stage: "cta"
              screen_order: 10
              branch_id: "student_school_math"
              role: "student"
              goal: "school_math"

            implementation_notes:
              - "Если пользователь не нажал CTA, он должен перейти в nurture-цепочку этой ветки."

      manager_messages:
        trial_signup: |
          Привет! Хочу записаться на пробное занятие по математике.
        ask_question: |
          Привет! У меня есть вопрос по занятиям по математике.

      nurture:
        id: "student_schoolmath_nurture"
        purpose: >
          Мягко догревать школьника, если он прошёл основную ветку,
          но не написал менеджеру.

        sequence:
          - screen:
              id: "student_schoolmath_follow_1"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 1 — если не понял, это не значит, что ты тупой"
              purpose: >
                Вернуть школьника в узнавание и снять внутреннее ощущение
                “со мной что-то не так”.

              text: |
                Если тебе уже объясняли математику, но ты всё равно не понял — это не значит, что ты тупой.

                Очень часто проблема просто в том, что тебе объясняли не тем языком и не через тот ход мысли, который тебе реально понятен.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_1_student_schoolmath"

                - text: "Читать дальше"
                  action: "go_to_next_nurture"
                  target: "student_schoolmath_follow_2"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_1_student_schoolmath"
                  "Читать дальше": "student_schoolmath_follow_2"

              analytics_tags:
                screen_group: "student_schoolmath"
                funnel_stage: "nurture"
                screen_order: 1
                branch_id: "student_school_math"
                role: "student"
                goal: "school_math"

          - screen:
              id: "student_schoolmath_follow_2"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 2 — если база поплыла, решать всё подряд не помогает"
              purpose: >
                Показать, что хаотичная работа поверх слабой базы
                обычно только ухудшает ситуацию.

              text: |
                Одна из самых частых ошибок — просто продолжать решать всё подряд, когда база уже где-то поплыла.

                Так обычно становится только тяжелее.

                Сначала важно понять,
                где именно у тебя начинается путаница,
                а уже потом строить нормальную работу дальше.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_2_student_schoolmath"

                - text: "Читать дальше"
                  action: "go_to_next_nurture"
                  target: "student_schoolmath_follow_3"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_2_student_schoolmath"
                  "Читать дальше": "student_schoolmath_follow_3"

              analytics_tags:
                screen_group: "student_schoolmath"
                funnel_stage: "nurture"
                screen_order: 2
                branch_id: "student_school_math"
                role: "student"
                goal: "school_math"

          - screen:
              id: "student_schoolmath_follow_3"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 3 — нужен не просто репетитор, а понятный человек"
              purpose: >
                Подвести школьника к мысли, что главное — найти человека,
                с которым будет реально понятно.

              text: |
                Скорее всего, тебе сейчас важно не просто “найти репетитора”.

                Тебе важно найти человека,
                с которым будет реально понятно
                и от занятий с которым будет смысл, а не просто ещё один урок ради галочки.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_3_student_schoolmath"

                - text: "Читать дальше"
                  action: "go_to_next_nurture"
                  target: "student_schoolmath_follow_4"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_3_student_schoolmath"
                  "Читать дальше": "student_schoolmath_follow_4"

              analytics_tags:
                screen_group: "student_schoolmath"
                funnel_stage: "nurture"
                screen_order: 3
                branch_id: "student_school_math"
                role: "student"
                goal: "school_math"

          - screen:
              id: "student_schoolmath_follow_4"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 4 — мягкий возврат к действию"
              purpose: >
                Последний мягкий возврат к менеджеру или перевод
                в общий полезный nurture.

              text: |
                Если хочешь, можешь просто написать менеджеру и коротко описать свою ситуацию.

                Без обязательств.

                Он подскажет, подойдёт ли тебе такой формат,
                и если да — предложит время для пробного.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_4_student_schoolmath"

                - text: "Пока просто читаю"
                  action: "stay_in_nurture"
                  target: "general_useful_nurture"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_4_student_schoolmath"
                  "Пока просто читаю": "general_useful_nurture"

              analytics_tags:
                screen_group: "student_schoolmath"
                funnel_stage: "nurture"
                screen_order: 4
                branch_id: "student_school_math"
                role: "student"
                goal: "school_math"

        manager_messages:
          follow_1: |
            Привет! Хочу уточнить по пробному занятию по математике.
          follow_2: |
            Привет! Хочу уточнить, как у вас на пробном понимают, где у меня слабые места.
          follow_3: |
            Привет! Хочу понять, подойдёт ли мне такой формат занятий.
          follow_4: |
            Привет! Хочу описать свою ситуацию и понять, подойдёт ли мне такой формат занятий.

  - branch:
      id: "student_exam"
      role: "role_student"
      goal: "goal_exam"
      title: "Школьник → ОГЭ / ЕГЭ"
      purpose: >
        Последовательно довести школьника до мысли, что проблема не в том,
        что он “вообще ничего не знает”, а в хаотичной подготовке и знаниях
        кусками; что здесь можно получить понятный маршрут подготовки;
        и что пробное — это нормальный способ быстро понять свой уровень,
        слабые места и следующий шаг.

      screens:
        - screen:
            id: "student_exam_4"
            type: "content"
            scope: "student_branch"
            title: "Экран 4 — узнавание ситуации"
            purpose: >
              Показать школьнику, что бот понимает его контекст:
              знания кусками, общей картины нет, подготовка превращается в хаос.

            text: |
              Поняли тебя.

              Когда дело доходит до ОГЭ или ЕГЭ, проблема обычно не в том, что ты вообще ничего не знаешь.

              Чаще всё выглядит так:
              какие-то темы ты более-менее понимаешь,
              какие-то знаешь кусками,
              где-то уже есть пробелы,
              но общей картины нет.

              Из-за этого подготовка часто превращается в хаос:
              что-то решаешь,
              что-то повторяешь,
              но не очень понятно, где у тебя реальные слабые места и с чего сейчас важнее всего начинать.

              Сейчас коротко покажем, как мы в Менториуме с этим работаем 👇

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_exam_5"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_exam_5"

            analytics_tags:
              screen_group: "student_exam"
              funnel_stage: "branch_core"
              screen_order: 4
              branch_id: "student_exam"
              role: "student"
              goal: "exam"

            implementation_notes:
              - "Первый экран ветки после общей сегментации."
              - "Экран должен работать без медиа в MVP."
              - "Тон должен быть прямым и живым, без родительских формулировок."

        - screen:
            id: "student_exam_5"
            type: "content"
            scope: "student_branch"
            title: "Экран 5 — типичная ситуация"
            purpose: >
              Углубить узнавание и назвать типичные состояния школьника
              перед экзаменом: нет системы, нет ясности, есть риск терять время.

            text: |
              Обычно в такой ситуации всё выглядит примерно так:

              — экзамен всё ближе, а полной уверенности нет
              — что-то ты знаешь, но подготовка идёт без системы
              — непонятно, какие темы у тебя реально проседают
              — есть ощущение, что можно просто потерять время на хаотичную подготовку
              — хочется не просто “делать математику”, а понимать, как прийти к результату

              И в такой момент важнее не просто решать больше,
              а сначала понять свой текущий уровень и выстроить нормальный маршрут подготовки.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
