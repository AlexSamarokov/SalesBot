            title: "Экран 6 — как работает Менториум"
            purpose: >
              Показать механику сервиса и УТП школы в контексте олимпиад,
              поступления и сильного математического уровня.

            text: |
              Поэтому в Менториуме мы не просто даём занятия по математике.

              Мы выстраиваем работу так, чтобы она соответствовала именно той цели, ради которой ты пришёл:
              олимпиада,
              поступление,
              сильная школа,
              или просто более высокий уровень математики.

              Что это значит на практике:

              — только индивидуальные занятия, без групп
              — преподавателя подбираем под конкретную цель и твой текущий уровень
              — выстраиваем индивидуальный план подготовки
              — каждую неделю даём индивидуальные контрольные под твою задачу
              — у каждого ученика есть личный ассистент-математик
              — с тобой работают только молодые преподаватели, студенты топовых вузов России, чтобы можно было нормально общаться и быть на одной волне

              То есть здесь важно не просто “заниматься”,
              а идти по маршруту, который реально подходит под твою цель.

