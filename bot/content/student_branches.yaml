              funnel_stage: "branch_core"
              screen_order: 6
              branch_id: "student_exam"
              role: "student"
              goal: "exam"

            implementation_notes:
              - "Можно позже добавить карточку с преимуществами экзаменационного формата."
              - "Нельзя скатываться в сухой язык."

        - screen:
            id: "student_exam_7"
            type: "content"
            scope: "student_branch"
            title: "Экран 7 — зачем начинать с пробного"
            purpose: >
              Снять главный вопрос школьника: какой у него уровень,
              с чего начинать, и будет ли от занятий реальный толк.

            text: |
              Если ты сейчас ищешь подготовку к ОГЭ или ЕГЭ, тебе, скорее всего, важно не просто найти репетитора.

              Тебе важно понять:

              — какой у тебя уровень сейчас
              — где именно у тебя слабые места
              — с чего лучше начинать подготовку
              — насколько всё критично по времени
              — и будет ли от занятий реальный толк

              Поэтому мы начинаем с пробного:
              чтобы сначала спокойно понять твою ситуацию,
              а потом уже выстроить нормальную подготовку дальше.

