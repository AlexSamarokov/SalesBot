              Тут вопрос в другом:
              какой у тебя уровень сейчас,
              что у тебя уже получается хорошо,
              а чего пока не хватает именно под твою цель.

              Потому что в таких задачах недостаточно просто “заниматься математикой”.
              Здесь важно понимать, куда именно ты идёшь и что тебе реально нужно усиливать.

