  - branch:
      id: "student_unsure"
      role: "role_student"
      goal: "goal_unsure"
      title: "Школьник → пока не знаю, хочу разобраться"
      purpose: >
        Последовательно довести школьника до мысли, что если запрос ещё
        не оформился до конца, это нормальная ситуация; что сначала важно
        спокойно понять, что у него сейчас с математикой; и что пробное —
        это нормальный способ получить ясность и понять следующий шаг.

      screens:
        - screen:
            id: "student_unsure_4"
            type: "content"
            scope: "student_branch"
            title: "Экран 4 — узнавание ситуации"
            purpose: >
              Показать школьнику, что бот понимает его контекст:
              ощущение, что с математикой что-то не так, уже есть,
              но полной ясности пока нет.

            text: |
              Поняли тебя.

              Бывает так, что по математике уже есть ощущение: что-то идёт не так,
              но пока не очень понятно, насколько всё серьёзно и что именно с этим делать.

              Где-то тема не зашла,
              где-то путаешься,
              где-то вроде что-то решаешь,
              но общей уверенности всё равно нет.

              И это нормальная ситуация.

              В такой момент важнее всего не гадать,
              а спокойно разобраться, что у тебя сейчас с математикой и какой следующий шаг будет для тебя правильным.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_unsure_5"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_unsure_5"

            analytics_tags:
              screen_group: "student_unsure"
              funnel_stage: "branch_core"
              screen_order: 4
              branch_id: "student_unsure"
              role: "student"
              goal: "unsure"

            implementation_notes:
              - "Первый экран ветки после общей сегментации."
              - "Экран должен работать без медиа в MVP."

        - screen:
            id: "student_unsure_5"
            type: "content"
            scope: "student_branch"
            title: "Экран 5 — типичная ситуация"
            purpose: >
              Углубить узнавание и назвать типичные состояния школьника,
              у которого запрос ещё не до конца оформился.

            text: |
              Обычно в такой ситуации всё выглядит примерно так:

              — вроде бы уже есть проблемы по математике, но непонятно, насколько они серьёзные
              — что-то ты понимаешь, а что-то вообще мимо
              — уверенности в своих знаниях нет
              — непонятно, с чего вообще начинать
              — не хочется просто вписываться куда-то наугад

              И в такой момент лучший первый шаг —
              не пытаться сразу угадать правильное решение,
              а сначала спокойно понять, что у тебя вообще происходит с математикой сейчас.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "student_unsure_6"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "student_unsure_6"

            analytics_tags:
              screen_group: "student_unsure"
              funnel_stage: "branch_core"
              screen_order: 5
              branch_id: "student_unsure"
              role: "student"
              goal: "unsure"

            implementation_notes:
              - "Экран должен усиливать мысль: отсутствие ясности — это нормальная ситуация."
              - "Не перегружать экран дополнительными CTA."

        - screen:
            id: "student_unsure_6"
            type: "content"
            scope: "student_branch"
            title: "Экран 6 — как работает Менториум"
            purpose: >
              Показать механику сервиса и УТП школы в ситуации,
              когда школьнику сначала нужна ясность, а не вписываться наугад.

            text: |
              Поэтому в Менториуме мы не просто даём занятия по математике.

              Мы сначала помогаем понять твою текущую ситуацию,
              а уже потом выстраиваем работу под твою реальную задачу.

              Что это значит на практике:

              — только индивидуальные занятия, без групп
              — преподавателя подбираем под твою цель и твой уровень
              — выстраиваем индивидуальный план подготовки
              — каждую неделю даём индивидуальные контрольные под твою задачу
              — у каждого ученика есть личный ассистент-математик
              — с тобой работают только молодые преподаватели, студенты топовых вузов России, чтобы объяснение было нормальным и вы были на одной волне

              То есть тебе не нужно заранее самому во всём разбираться —
              сначала мы помогаем понять ситуацию, а потом уже двигаться дальше.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
