            text: |
              Если вы сейчас ищете подготовку к ОГЭ или ЕГЭ, то вам, скорее всего, важно не просто найти преподавателя.

              Вам важно понять:

              — какой у ребёнка реальный уровень сейчас
              — где именно слабые места
              — насколько всё критично по времени
              — с чего лучше начинать подготовку
              — и подойдёт ли ребёнку сам преподаватель

              И это абсолютно нормальный вопрос.

              Поэтому мы начинаем с пробного:
              чтобы сначала спокойно разобраться в ситуации,
              а потом уже понимать, как двигаться дальше.

