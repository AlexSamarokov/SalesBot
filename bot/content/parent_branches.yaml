branches:
  - branch:
      id: "parent_school_math"
      role: "role_parent"
      goal: "goal_school_math"
      title: "Родитель → подтянуть школьную математику"
      purpose: >
        Последовательно довести родителя до мысли, что проблему можно спокойно
        разобрать, Менториум — это не случайный репетитор, а система, пробное —
        полезный и безопасный следующий шаг, а если родитель не готов записаться
        сразу, он может перейти в nurture-цепочку и позже написать менеджеру.

      screens:
        - screen:
            id: "parent_schoolmath_4"
            type: "content"
            scope: "parent_branch"
            title: "Экран 4 — узнавание ситуации"
            purpose: >
              Показать родителю, что бот понимает его контекст и что проблема
              обычно не в способностях ребёнка, а в накопившемся непонимании.

            text: |
              Поняли вас.

              Если вы сейчас ищете помощь по математике для ребёнка, то, скорее всего, проблема не в том, что он “не способен” к предмету.

              Обычно в какой-то момент просто пошло непонимание:
              одна тема не до конца уложилась,
              потом сверху наложилась следующая,
              и дальше математика начинает казаться всё тяжелее.

              В итоге ребёнок может что-то учить, что-то даже решать,
              но общей уверенности всё равно нет.

              Сейчас коротко покажем, как мы в Менториуме с этим работаем 👇

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_schoolmath_5"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_schoolmath_5"

            analytics_tags:
              screen_group: "parent_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 4
              branch_id: "parent_school_math"
              role: "parent"
              goal: "school_math"

            implementation_notes:
              - "Первый экран ветки после общей сегментации."
              - "Экран должен работать без медиа в MVP."

        - screen:
            id: "parent_schoolmath_5"
            type: "content"
            scope: "parent_branch"
            title: "Экран 5 — типичная ситуация"
            purpose: >
              Углубить узнавание и назвать типичные состояния родителей, которые ищут
              помощь по школьной математике.

            text: |
              Обычно в такой ситуации родители приходят к нам примерно с одним из таких ощущений:

              — ребёнок старается, но всё равно путается
              — оценки начинают проседать
              — в школе объясняют, но до конца не доходит
              — математика стала предметом, который вызывает напряжение
              — непонятно, с чего вообще начинать, чтобы это исправить

              И в такой момент важнее не просто срочно добавить ещё занятий,
              а сначала спокойно понять, где именно ребёнок просел и какой формат помощи ему действительно подойдёт.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_schoolmath_6"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_schoolmath_6"

            analytics_tags:
              screen_group: "parent_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 5
              branch_id: "parent_school_math"
              role: "parent"
              goal: "school_math"

            implementation_notes:
              - "Нельзя перегружать этот экран дополнительными CTA."

        - screen:
            id: "parent_schoolmath_6"
            type: "content"
            scope: "parent_branch"
            title: "Экран 6 — как работает Менториум"
            purpose: >
              Показать механику сервиса и ключевые УТП под запрос на школьную математику.

            text: |
              Поэтому в Менториуме мы не просто даём занятия по математике.

              Мы выстраиваем работу так, чтобы вашему ребёнку действительно стало понятнее и чтобы прогресс был виден не на словах, а по ходу обучения.

              Что это значит на практике:

              — только индивидуальные занятия, без групп
              — преподавателя подбираем под цель и под самого ученика
              — выстраиваем индивидуальный план подготовки
              — каждую неделю даём индивидуальные контрольные под конкретную задачу
              — отправляем родителю отчёты по прогрессу
              — у каждого ученика есть личный ассистент-математик
              — с ребёнком работают только молодые преподаватели, студенты топовых вузов России, чтобы ученик и преподаватель были на одной волне

              То есть здесь всё выстроено под конкретного ребёнка и его реальную ситуацию.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_schoolmath_7"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_schoolmath_7"

            analytics_tags:
              screen_group: "parent_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 6
              branch_id: "parent_school_math"
              role: "parent"
              goal: "school_math"

            implementation_notes:
              - "Экран опирается на УТП школы."
              - "В будущем сюда можно добавить карточку с преимуществами."

        - screen:
            id: "parent_schoolmath_7"
            type: "content"
            scope: "parent_branch"
            title: "Экран 7 — зачем начинать с пробного"
            purpose: >
              Снять главный страх родителя: подойдёт ли преподаватель и будет ли толк от занятий.

            text: |
              Если вы сейчас в поиске репетитора, то, скорее всего, вам важно не просто найти преподавателя по математике.

              Вам важно понять:

              — подойдёт ли он именно вашему ребёнку
              — будет ли ребёнку с ним понятно
              — появится ли от занятий реальный прогресс
              — и не окажется ли это ещё одной пустой попыткой

              И это нормальный вопрос.

              Поэтому мы начинаем с пробного:
              чтобы сначала спокойно разобраться в ситуации,
              а потом уже понимать, как двигаться дальше.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_schoolmath_8"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_schoolmath_8"

            analytics_tags:
              screen_group: "parent_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 7
              branch_id: "parent_school_math"
              role: "parent"
              goal: "school_math"

            implementation_notes:
              - "Не использовать формулировку про 'не чтобы продавать занятия'."

        - screen:
            id: "parent_schoolmath_8"
            type: "content"
            scope: "parent_branch"
            title: "Экран 8 — как проходит пробное"
            purpose: >
              Объяснить механику пробного занятия и показать, что это полезный и
              понятный шаг.

            text: |
              Пробное занятие у нас — это не просто первый урок.

              Оно нужно, чтобы быстро понять текущую ситуацию ребёнка и показать, как с ней можно работать дальше.

              На пробном мы обычно:

              — знакомимся с учеником и смотрим, как он вообще воспринимает математику
              — даём несколько заданий или вопросов по его уровню
              — смотрим, где именно начинается непонимание
              — объясняем один из моментов так, чтобы ребёнку уже на самом пробном стало понятнее
              — в конце формируем понятный следующий шаг

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_schoolmath_9"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_schoolmath_9"

            analytics_tags:
              screen_group: "parent_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 8
              branch_id: "parent_school_math"
              role: "parent"
              goal: "school_math"

            implementation_notes:
              - "Позже сюда можно добавить короткое видео о пробном."

        - screen:
            id: "parent_schoolmath_9"
            type: "content"
            scope: "parent_branch"
            title: "Экран 9 — что родитель получает после пробного"
            purpose: >
              Продать результат пробного как понятную картину ситуации и следующий шаг.

            text: |
              После пробного у вас не остаётся ощущения “ну вроде поговорили”.

              Вы получаете понятную картину:

              — что у ребёнка сейчас получается лучше
              — где именно основные слабые места
              — что мешает двигаться дальше
              — какой формат работы подойдёт лучше всего
              — с чего логично начать, чтобы был прогресс

              То есть пробное даёт не просто знакомство,
              а первое понимание ситуации и следующий шаг.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_schoolmath_10"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_schoolmath_10"

            analytics_tags:
              screen_group: "parent_schoolmath"
              funnel_stage: "branch_core"
              screen_order: 9
              branch_id: "parent_school_math"
              role: "parent"
              goal: "school_math"

            implementation_notes:
              - "Этот экран усиливает ценность пробного перед CTA."

        - screen:
            id: "parent_schoolmath_10"
            type: "cta"
            scope: "parent_branch"
            title: "Экран 10 — главный CTA"
            purpose: >
              Мягко, но уверенно перевести родителя в контакт с менеджером.

            text: |
              Следующий шаг — просто написать менеджеру.

              Он уточнит вашу ситуацию,
              поможет сориентироваться,
              подберёт подходящего преподавателя
              и предложит удобное время для пробного.

              Если вам так спокойнее, можно сначала просто задать вопрос без записи.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Записаться на пробное"
                action: "open_trial_signup"
                target: "manager_trial_signup_parent_schoolmath"

              - text: "Задать вопрос"
                action: "open_manager_chat"
                target: "manager_question_parent_schoolmath"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Записаться на пробное": "manager_trial_signup_parent_schoolmath"
                "Задать вопрос": "manager_question_parent_schoolmath"

            analytics_tags:
              screen_group: "parent_schoolmath"
              funnel_stage: "cta"
              screen_order: 10
              branch_id: "parent_school_math"
              role: "parent"
              goal: "school_math"

            implementation_notes:
              - "Если пользователь не нажал ни одну кнопку CTA, он должен перейти в nurture-цепочку этой ветки."
              - "В MVP можно также дублировать этот CTA через постоянное меню."

      manager_messages:
        trial_signup: |
          Добрый день! Хочу записаться на пробное занятие по математике.
        ask_question: |
          Добрый день! У меня есть вопрос по занятиям по математике.

      nurture:
        id: "parent_school_math_nurture"
        purpose: >
          Мягко догревать родителя, если он прошёл основную ветку, но не написал менеджеру.

        sequence:
          - screen:
              id: "parent_schoolmath_follow_1"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 1 — узнавание"
              purpose: >
                Вернуть родителя в узнавание его ситуации.

              text: |
                Иногда со стороны кажется, что ребёнок просто стал хуже в математике.

                Но чаще дело не в том, что он “не может”.
                Обычно где-то просто накопились непонятые темы, и дальше они начинают тянуть вниз всё остальное.

                Из-за этого математика начинает ощущаться тяжёлой, даже если сам ребёнок не глупый и не ленивый.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_1_parent_schoolmath"

                - text: "Читать дальше"
                  action: "go_to_next_nurture"
                  target: "parent_schoolmath_follow_2"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_1_parent_schoolmath"
                  "Читать дальше": "parent_schoolmath_follow_2"

              analytics_tags:
                screen_group: "parent_schoolmath"
                funnel_stage: "nurture"
                screen_order: 1
                branch_id: "parent_school_math"
                role: "parent"
                goal: "school_math"

          - screen:
              id: "parent_schoolmath_follow_2"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 2 — полезная мысль"
              purpose: >
                Показать, что проблема не решается простым увеличением количества занятий.

              text: |
                Одна из самых частых ошибок — пытаться сразу заниматься больше, не понимая, где именно проблема.

                А в математике это почти всегда работает хуже.

                Сначала важно увидеть:
                что именно у ребёнка уже не держится,
                где он начинает путаться,
                и что сейчас тянет вниз всё остальное.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_2_parent_schoolmath"

                - text: "Читать дальше"
                  action: "go_to_next_nurture"
                  target: "parent_schoolmath_follow_3"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_2_parent_schoolmath"
                  "Читать дальше": "parent_schoolmath_follow_3"

              analytics_tags:
                screen_group: "parent_schoolmath"
                funnel_stage: "nurture"
                screen_order: 2
                branch_id: "parent_school_math"
                role: "parent"
                goal: "school_math"

          - screen:
              id: "parent_schoolmath_follow_3"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 3 — снятие сомнения"
              purpose: >
                Снять сомнение и вернуть родителя к спокойной логике пробного.

              text: |
                Скорее всего, вам сейчас важно не просто найти ещё одного преподавателя.

                Вам важно не потратить время впустую
                и понять, подойдёт ли этот формат именно вашему ребёнку.

                Поэтому здесь всё начинается спокойно:
                сначала пробное,
                потом понимание ситуации,
                и только после этого уже решение, как двигаться дальше.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_3_parent_schoolmath"

                - text: "Читать дальше"
                  action: "go_to_next_nurture"
                  target: "parent_schoolmath_follow_4"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_3_parent_schoolmath"
                  "Читать дальше": "parent_schoolmath_follow_4"

              analytics_tags:
                screen_group: "parent_schoolmath"
                funnel_stage: "nurture"
                screen_order: 3
                branch_id: "parent_school_math"
                role: "parent"
                goal: "school_math"

          - screen:
              id: "parent_schoolmath_follow_4"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 4 — мягкий возврат к действию"
              purpose: >
                Последний мягкий возврат к менеджеру или перевод в более общий nurture.

              text: |
                Если захотите, можно просто написать менеджеру и коротко описать ситуацию.

                Без обязательств.

                Он поможет сориентироваться,
                подскажет, подойдёт ли вам такой формат,
                и если да — предложит удобное время для пробного.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
                supported_types:
                  - photo
                  - video
                  - document

              buttons:
                - text: "Написать менеджеру"
                  action: "open_manager_chat"
                  target: "manager_follow_4_parent_schoolmath"

                - text: "Пока просто читаю"
                  action: "stay_in_nurture"
                  target: "general_useful_nurture"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_4_parent_schoolmath"
                  "Пока просто читаю": "general_useful_nurture"

              analytics_tags:
                screen_group: "parent_schoolmath"
                funnel_stage: "nurture"
                screen_order: 4
                branch_id: "parent_school_math"
                role: "parent"
                goal: "school_math"

        manager_messages:
          follow_1: |
            Добрый день! Похоже, у нас как раз такая ситуация. Хочу уточнить по пробному занятию.
          follow_2: |
            Добрый день! Хочу уточнить, как у вас проходит пробное и что вы на нём определяете.
          follow_3: |
