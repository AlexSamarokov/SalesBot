      title: "Родитель → олимпиады / поступление"
      purpose: >
        Последовательно довести родителя до мысли, что для сильной цели нужен
        не просто репетитор по математике, а точный подбор под конкретную задачу;
        что сначала важно понять текущий уровень ребёнка относительно цели;
        и что пробное — это логичный способ получить первую оценку ситуации и
        подобрать правильный маршрут подготовки.

      screens:
        - screen:
            id: "parent_olymp_4"
            type: "content"
            scope: "parent_branch"
            title: "Экран 4 — узнавание ситуации"
            purpose: >
              Показать родителю, что бот понимает его контекст:
              цель уже выше среднего, нужен не просто преподаватель,
              а понимание текущего уровня ребёнка относительно сильной задачи.

            text: |
              Поняли вас.

              Когда цель — олимпиада, поступление или просто более сильный уровень математики, вопрос обычно уже не в том, “нужен ли репетитор вообще”.

              Вопрос в другом:
              какой у ребёнка уровень сейчас,
              чего ему уже хватает,
              а чего пока не хватает именно под эту цель.

              Потому что в таких задачах недостаточно просто “заниматься математикой”.
              Здесь важно понимать, куда именно вы хотите прийти и какой путь к этой цели будет для ребёнка правильным.

              Сейчас коротко покажем, как мы в Менториуме с этим работаем 👇

