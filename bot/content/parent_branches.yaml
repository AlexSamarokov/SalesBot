                  action: "open_manager_chat"
                  target: "manager_follow_1_parent_unsure"

                - text: "Читать дальше"
                  action: "go_to_next_nurture"
                  target: "parent_unsure_follow_2"

              menu_actions_available: true
              menu_actions:
                - action_id: "global_trial_signup"
                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_1_parent_unsure"
                  "Читать дальше": "parent_unsure_follow_2"

              analytics_tags:
                screen_group: "parent_unsure"
                funnel_stage: "nurture"
                screen_order: 1
                branch_id: "parent_unsure"
                role: "parent"
                goal: "unsure"

          - screen:
              id: "parent_unsure_follow_2"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 2 — сначала нужно понять ситуацию"
              purpose: >
                Показать, что сначала важно понять, что происходит,
                а не угадывать решение.

              text: |
                В такой ситуации главное — не пытаться сразу угадать правильное решение.

                Сначала лучше понять:
                что у ребёнка уже получается,
                где начинаются основные трудности
                и какой формат помощи ему вообще нужен.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
                optional_in_future: true
