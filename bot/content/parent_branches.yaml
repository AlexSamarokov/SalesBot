        - screen:
            id: "parent_exam_5"
            type: "content"
            scope: "parent_branch"
            title: "Экран 5 — типичная ситуация родителя перед экзаменом"
            purpose: >
              Углубить узнавание и назвать типичные состояния родителя:
              тревога, отсутствие системы, страх потерять время.

            text: |
              Обычно в такой ситуации родители приходят к нам примерно с одним из таких ощущений:

              — экзамен уже приближается, а полной уверенности нет
              — ребёнок что-то знает, но подготовка идёт без системы
              — непонятно, какие темы реально западают
              — есть страх потерять время на хаотичную подготовку
              — хочется не просто “заниматься математикой”, а понимать, как прийти к результату

              И в такой момент важнее не просто срочно добавить ещё занятий,
              а сначала спокойно понять текущий уровень ребёнка и выстроить нормальный маршрут подготовки.

