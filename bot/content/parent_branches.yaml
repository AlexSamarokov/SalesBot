                  text: "Записаться на пробное"
                - action_id: "global_contact_manager"
                  text: "Написать менеджеру"

              transitions:
                on_button_click:
                  "Написать менеджеру": "manager_follow_2_parent_unsure"
                  "Читать дальше": "parent_unsure_follow_3"

              analytics_tags:
                screen_group: "parent_unsure"
                funnel_stage: "nurture"
                screen_order: 2
                branch_id: "parent_unsure"
                role: "parent"
                goal: "unsure"

          - screen:
              id: "parent_unsure_follow_3"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 3 — не нужен репетитор на всякий случай"
              purpose: >
                Снять сомнение и вернуть родителя к спокойной логике:
                сначала ясность, потом решение.

              text: |
                Скорее всего, вам сейчас важно не просто найти репетитора “на всякий случай”.

                Вам важно спокойно разобраться в ситуации
                и уже потом понять, как лучше действовать дальше.

                Именно для этого у нас и есть пробное:
                чтобы сначала появилась ясность.

              media:
                enabled: false
                type: null
                file_id: null
                caption: null
