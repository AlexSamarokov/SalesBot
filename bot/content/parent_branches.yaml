  - branch:
      id: "parent_unsure"
      role: "role_parent"
      goal: "goal_unsure"
      title: "Родитель → пока не знаю, хочу разобраться"
      purpose: >
        Последовательно довести родителя до мысли, что даже если запрос ещё
        не оформился до конца, это нормальная ситуация; что сначала важно
        спокойно понять, что происходит с математикой у ребёнка; и что
        пробное — это логичный способ получить ясность и понять следующий шаг.

      screens:
        - screen:
            id: "parent_unsure_4"
            type: "content"
            scope: "parent_branch"
            title: "Экран 4 — узнавание ситуации"
            purpose: >
              Показать родителю, что бот понимает его контекст:
              ощущение, что с математикой что-то не так, уже есть,
              но полной ясности пока нет.

            text: |
              Поняли вас.

              Бывает так, что по математике уже есть ощущение: что-то идёт не так,
              но пока не до конца понятно, насколько это серьёзно и что именно с этим делать.

              Ребёнок где-то путается,
              какие-то темы даются тяжелее,
              уверенности нет,
              но чёткой картины пока тоже нет.

              И это нормальная ситуация.

              В такой момент важнее всего не гадать,
              а спокойно разобраться, что у ребёнка сейчас с математикой и какой следующий шаг для него будет правильным.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_unsure_5"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_unsure_5"

            analytics_tags:
              screen_group: "parent_unsure"
              funnel_stage: "branch_core"
              screen_order: 4
              branch_id: "parent_unsure"
              role: "parent"
              goal: "unsure"

            implementation_notes:
              - "Первый экран ветки после общей сегментации."
              - "Экран должен работать без медиа в MVP."

        - screen:
            id: "parent_unsure_5"
            type: "content"
            scope: "parent_branch"
            title: "Экран 5 — типичная ситуация родителя"
            purpose: >
              Углубить узнавание и назвать типичные состояния родителя,
              у которого запрос ещё не до конца оформился.

            text: |
              Обычно в такой ситуации родители приходят к нам примерно с одним из таких ощущений:

              — вроде бы уже есть вопросы по математике, но цель пока не до конца ясна
              — непонятно, это просто временные трудности или уже накопились серьёзные пробелы
              — ребёнок что-то делает, но уверенности всё равно нет
              — хочется сначала понять реальную ситуацию, а уже потом решать, как действовать
              — не хочется метаться между разными вариантами и выбирать вслепую

              И в такой момент лучший первый шаг —
              не пытаться сразу угадать, какой формат нужен,
              а сначала спокойно понять, что именно происходит.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_unsure_6"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_unsure_6"

            analytics_tags:
              screen_group: "parent_unsure"
              funnel_stage: "branch_core"
              screen_order: 5
              branch_id: "parent_unsure"
              role: "parent"
              goal: "unsure"

            implementation_notes:
              - "Экран должен усиливать мысль: запрос может быть ещё не оформлен, и это нормально."
              - "Не перегружать экран дополнительными CTA."

        - screen:
            id: "parent_unsure_6"
            type: "content"
            scope: "parent_branch"
            title: "Экран 6 — как работает Менториум"
            purpose: >
              Показать механику сервиса и УТП школы в ситуации,
              когда родителю сначала нужна ясность, а не готовое решение вслепую.

            text: |
              Поэтому в Менториуме мы не просто даём занятия по математике.

              Мы сначала помогаем понять, какая у ребёнка ситуация сейчас,
              а уже потом выстраиваем работу под его реальную задачу.

              Что это значит на практике:

              — только индивидуальные занятия, без групп
              — преподавателя подбираем под цель и под самого ученика
              — выстраиваем индивидуальный план подготовки
              — каждую неделю даём индивидуальные контрольные под конкретную задачу
              — отправляем родителю отчёты по прогрессу
              — у каждого ученика есть личный ассистент-математик
              — с ребёнком работают только молодые преподаватели, студенты топовых вузов России, чтобы ученик и преподаватель были на одной волне

              То есть здесь не нужно заранее во всём разбираться самому —
              мы помогаем сначала понять ситуацию, а потом уже двигаться дальше.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_unsure_7"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_unsure_7"

            analytics_tags:
              screen_group: "parent_unsure"
              funnel_stage: "branch_core"
              screen_order: 6
              branch_id: "parent_unsure"
              role: "parent"
              goal: "unsure"

            implementation_notes:
              - "Можно позже добавить карточку с преимуществами формата."
              - "Текст должен оставаться простым и спокойным."

        - screen:
            id: "parent_unsure_7"
            type: "content"
            scope: "parent_branch"
            title: "Экран 7 — зачем начинать с пробного"
            purpose: >
              Объяснить, что в ситуации неопределённости пробное — лучший первый шаг,
              потому что оно даёт ясность.

            text: |
              Если вы пока не до конца понимаете, что именно сейчас нужно вашему ребёнку, это как раз тот случай, когда лучше всего начинать с пробного.

              Потому что пробное помогает спокойно ответить на главные вопросы:

              — что у ребёнка с математикой сейчас
              — где именно слабые места
              — насколько это критично
              — нужен ли упор на базу, школьную программу, экзамен или более сильный уровень
              — и какой преподаватель подойдёт лучше всего

              Поэтому пробное здесь — это не формальность,
              а способ получить ясность и понять, что делать дальше.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_unsure_8"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_unsure_8"

            analytics_tags:
              screen_group: "parent_unsure"
              funnel_stage: "branch_core"
              screen_order: 7
              branch_id: "parent_unsure"
              role: "parent"
              goal: "unsure"

            implementation_notes:
              - "Экран должен продавать пробное как способ получить ясность, а не как формальность."

        - screen:
            id: "parent_unsure_8"
            type: "content"
            scope: "parent_branch"
            title: "Экран 8 — как проходит пробное"
            purpose: >
              Объяснить механику пробного и показать, что это полезный
              и понятный первый шаг.

            text: |
              Пробное занятие у нас — это не просто первый урок.

              Оно нужно, чтобы быстро понять текущую ситуацию ребёнка и помочь вам сориентироваться дальше.

              На пробном мы обычно:

              — знакомимся с учеником и смотрим, как он воспринимает математику
              — даём задания и вопросы по его уровню
              — смотрим, где именно начинается непонимание
              — объясняем один из моментов так, чтобы ребёнку уже на пробном стало понятнее
              — в конце формируем понятный следующий шаг

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_unsure_9"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_unsure_9"

            analytics_tags:
              screen_group: "parent_unsure"
              funnel_stage: "branch_core"
              screen_order: 8
              branch_id: "parent_unsure"
              role: "parent"
              goal: "unsure"

            implementation_notes:
              - "Позже сюда можно добавить короткое видео или карточку о пробном."

        - screen:
            id: "parent_unsure_9"
            type: "content"
            scope: "parent_branch"
            title: "Экран 9 — что родитель получает после пробного"
            purpose: >
              Продать результат пробного как снятие тумана и понимание следующего шага.

            text: |
              После пробного у вас появляется более понятная картина.

              Вы начинаете видеть:

              — что у ребёнка уже получается
              — где именно основные слабые места
              — насколько ситуация требует срочной работы
              — в какую сторону логичнее двигаться дальше
              — какой формат помощи подойдёт лучше всего

              То есть пробное помогает не просто познакомиться,
              а снять туман и понять, что делать дальше.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Дальше"
                action: "go_to_screen"
                target: "parent_unsure_10"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Дальше": "parent_unsure_10"

            analytics_tags:
              screen_group: "parent_unsure"
              funnel_stage: "branch_core"
              screen_order: 9
              branch_id: "parent_unsure"
              role: "parent"
              goal: "unsure"

            implementation_notes:
              - "Этот экран усиливает ценность пробного перед CTA."

        - screen:
            id: "parent_unsure_10"
            type: "cta"
            scope: "parent_branch"
            title: "Экран 10 — главный CTA"
            purpose: >
              Мягко перевести родителя в контакт с менеджером
              для записи на пробное или вопроса.

            text: |
              Следующий шаг — просто написать менеджеру.

              Он уточнит вашу ситуацию,
              поможет сориентироваться,
              подберёт подходящего преподавателя
              и предложит удобное время для пробного.

              Если вам так спокойнее, можно сначала просто задать вопрос без записи.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
              supported_types:
                - photo
                - video
                - document

            buttons:
              - text: "Записаться на пробное"
                action: "open_trial_signup"
                target: "manager_trial_signup_parent_unsure"

              - text: "Задать вопрос"
                action: "open_manager_chat"
                target: "manager_question_parent_unsure"

            menu_actions_available: true
            menu_actions:
              - action_id: "global_trial_signup"
                text: "Записаться на пробное"
              - action_id: "global_contact_manager"
                text: "Написать менеджеру"

            transitions:
              on_button_click:
                "Записаться на пробное": "manager_trial_signup_parent_unsure"
                "Задать вопрос": "manager_question_parent_unsure"

            analytics_tags:
              screen_group: "parent_unsure"
              funnel_stage: "cta"
              screen_order: 10
              branch_id: "parent_unsure"
              role: "parent"
              goal: "unsure"

            implementation_notes:
              - "Если пользователь не нажал CTA, он должен перейти в nurture-цепочку этой ветки."

      manager_messages:
        trial_signup: |
          Добрый день! Хочу записаться на пробное занятие по математике, чтобы понять текущую ситуацию ребёнка.
        ask_question: |
          Добрый день! У меня есть вопрос по занятиям по математике. Пока хочу разобраться, какой формат нам подойдёт.

      nurture:
        id: "parent_unsure_nurture"
        purpose: >
          Мягко догревать родителя, если он прошёл основную ветку,
          но не написал менеджеру.

        sequence:
          - screen:
              id: "parent_unsure_follow_1"
              type: "nurture"
              scope: "nurture"
              title: "Дожим 1 — неясно, насколько всё серьёзно"
              purpose: >
                Вернуть родителя в узнавание его состояния:
                главная проблема — отсутствие ясности.

              text: |
                Иногда самое неприятное — даже не сама проблема, а то, что непонятно, насколько всё серьёзно.

                Вроде бы есть ощущение, что с математикой что-то не так,
                но пока нет ясности:
                это уже накопившиеся пробелы
                или просто временная просадка.

