              - "Не добавлять дополнительных CTA кроме кнопки перехода дальше."

        - screen:
            id: "parent_exam_6"
            type: "content"
            scope: "parent_branch"
            title: "Экран 6 — как работает Менториум в экзаменационной задаче"
            purpose: >
              Показать механику сервиса и УТП школы именно в контексте
              экзаменационной подготовки.

            text: |
              Поэтому в Менториуме мы не просто даём занятия по математике.

              Мы выстраиваем подготовку так, чтобы у ребёнка была не разрозненная подготовка, а понятная система движения к экзамену.

              Что это значит на практике:

              — только индивидуальные занятия, без групп
              — преподавателя подбираем под цель и уровень ученика
              — выстраиваем индивидуальный план подготовки
              — каждую неделю даём индивидуальные контрольные под конкретную задачу
              — видим, какие темы ребёнок уже понимает уверенно, а какие ещё нужно усиливать
              — отправляем родителю отчёты по прогрессу
              — у каждого ученика есть личный ассистент-математик
              — с ребёнком работают только молодые преподаватели, студенты топовых вузов России, чтобы ученик и преподаватель были на одной волне

              То есть подготовка идёт не “как получится”, а по понятному маршруту.

