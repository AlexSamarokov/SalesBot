            type: "content"
            scope: "parent_branch"
            title: "Экран 7 — зачем сначала пробное"
            purpose: >
              Снять сомнения родителя: насколько ребёнок близок к цели,
              что нужно усиливать и какой формат подготовки ему подойдёт.

            text: |
              Если вы сейчас ищете занятия под олимпиаду, поступление или сильную математику, то вам, скорее всего, важно не просто найти преподавателя.

              Вам важно понять:

              — какой у ребёнка уровень сейчас
              — насколько он уже близок к нужной цели
              — что ему нужно усиливать в первую очередь
              — какой преподаватель действительно подойдёт под такую задачу
              — и какой формат подготовки даст результат

              И это абсолютно нормальный вопрос.

              Поэтому мы начинаем с пробного:
              чтобы сначала спокойно разобраться в ситуации,
              а потом уже понимать, как лучше двигаться дальше.

