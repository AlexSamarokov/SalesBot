        - screen:
            id: "parent_olymp_5"
            type: "content"
            scope: "parent_branch"
            title: "Экран 5 — типичная ситуация родителя"
            purpose: >
              Углубить узнавание и назвать типичные запросы родителя
              при сильной цели: олимпиада, поступление, сильная математическая среда.

            text: |
              Обычно в такой ситуации родители приходят к нам примерно с одним из таких запросов:

              — ребёнок сильный, но хочется выйти на более высокий уровень
              — есть цель поступления, но непонятно, насколько текущая база под неё подходит
              — хочется подготовить ребёнка к олимпиадам или сильной математической среде
              — нужен преподаватель, который сможет работать не “в среднем”, а под конкретную цель
              — хочется понять, где сейчас потолок ребёнка и как его сдвигать дальше

              И в такой момент важно не просто найти “ещё одного преподавателя по математике”,
              а сначала понять текущий уровень ребёнка и подобрать формат работы именно под эту задачу.

            media:
              enabled: false
              type: null
              file_id: null
              caption: null
              optional_in_future: true
