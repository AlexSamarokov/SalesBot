        - screen:
            id: "parent_olymp_6"
            type: "content"
            scope: "parent_branch"
            title: "Экран 6 — как работает Менториум под сильные цели"
            purpose: >
              Показать механику сервиса и УТП школы именно в контексте
              олимпиад, поступления и сильного математического уровня.

            text: |
              Поэтому в Менториуме мы не просто даём занятия по математике.

              Мы выстраиваем работу так, чтобы она соответствовала именно той цели, ради которой вы пришли:
              олимпиада,
              поступление,
              сильная школа,
              или просто более высокий уровень математики.

              Что это значит на практике:

              — только индивидуальные занятия, без групп
              — преподавателя подбираем под конкретную цель и текущий уровень ученика
              — выстраиваем индивидуальный план подготовки
              — каждую неделю даём индивидуальные контрольные под конкретную задачу
              — отправляем родителю отчёты по прогрессу
              — у каждого ученика есть личный ассистент-математик
              — с ребёнком работают только молодые преподаватели, студенты топовых вузов России, чтобы ученик и преподаватель были на одной волне

              То есть здесь важно не просто “заниматься”,
              а идти по маршруту, который реально соответствует цели ребёнка.

